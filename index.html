<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>leaflet.trackplayback</title>
  <link rel="stylesheet" href="./lib/leaflet/leaflet.css">
  <link rel="stylesheet" href="../downloaded_website/control.playback.css">
  <script src="./lib/leaflet/leaflet.js"></script>
  <script src="../downloaded_website/control.trackplayback.js"></script>
  <script src="../downloaded_website/leaflet.trackplayback.js"></script>
  
</head>

<body>
  
  <div id='mapid' style=" position: absolute; left: 0; top: 0; right: 0; bottom: 0; width: 100%; height: 100%; overflow: hidden;"></div>
  <script>
     var marker;
    // create map and add baseLayer
    const map = L.map('mapid').setView([43.82632, 25.943415], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // get data from server
    const xhr = new XMLHttpRequest();
    xhr.open('GET', './data/output.json', false);  // gebruik jouw nieuwe bestand
    xhr.onreadystatechange = xhrCallback;
    xhr.send();

    function xhrCallback() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        const trackplayback = L.trackplayback(data, map, {
          targetOptions: {
            useImg: true,
            //imgUrl: 'examples/ship.png'
          }
        });
        const trackplaybackControl = L.trackplaybackcontrol(trackplayback);
        trackplaybackControl.addTo(map);
		//console.log('end');
		console.log(trackplayback);
		trackplayback.on('start', e => {
           console.log(e.tracks)
        }, this)
      }
	  
    }
	
map.on('click',function mapClickListen(e) {
    
	
  });
  </script>
</body>

</html>
